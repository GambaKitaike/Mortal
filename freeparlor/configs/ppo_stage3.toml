# PPO Stage3 — 構造化探索: anneal 付き per-decision 鳴きボーナス (stage3_design.md §2)
# diff vs stage1 config (freeparlor/configs/ppo_p3_stage1.toml): run paths,
# explicit `p_enrich = 0.0`, and the three `call_bonus_*` schedule keys only;
# all other hyperparameters identical per stage3_design.md §2 (lr=2e-5,
# tau_init=1.0, c_ent=0.01, eps_clip=0.2, ppo_epochs=4, max_steps=16000,
# save_every=2000). init_checkpoint stays beta1_huber_192x40 (init).
#
# Run paths below use the placeholder `stage3_20260712_033403`; the launcher
# freeparlor/scripts/run_ppo_stage3.sh substitutes the real `stage3_<日時>`
# run dir in place at launch (mirroring run_ppo_stage2.sh). This file itself
# must not be edited post-launch (frozen per pre-registration rule).

[control]
version = 4
online = true

state_file = '/home/gamba/mahjong/runs/ppo/stage3_20260712_033403/mortal.pth'
best_state_file = '/home/gamba/mahjong/runs/ppo/stage3_20260712_033403/best.pth'
tensorboard_dir = '/home/gamba/mahjong/runs/ppo/stage3_20260712_033403/tb'

device = 'cuda:0'
enable_cudnn_benchmark = false
enable_amp = true
enable_compile = false

batch_size = 128
opt_step_every = 1
save_every = 2000
test_every = 100000
submit_every = 50

[ppo]
enabled = true
eps_clip = 0.2
c_vf = 0.5
c_ent = 0.01
gae_lambda = 0.95
gamma_disc = 1.0
tau_init = 1.0
huber_delta = 15.0
lr = 2e-5
ppo_epochs = 4
minibatch_size = 512
init_checkpoint = '/home/gamba/mahjong/runs/phase4/beta1_huber_192x40/mortal.pth'
max_steps = 16000
# Stage3 は自然分布 (stage3_design.md §2: p_enrich=0、全経路)。Stage2 の
# 配牌赤濃縮は使わない — 分布介入なし、報酬ボーナス1変数のみ。
p_enrich = 0.0
# Stage3 anneal 付き per-decision 鳴きボーナス (stage3_design.md §2)。
# 鳴き可能∧赤保持で鳴きを実行した decision step の報酬に b を加算
# (trainer 側のみ、eval 経路は常時 0 — verify check 17d/18)。単位は千点
# (b=5.0 は 1 チップ相当/鳴き実行)。schedule: step 0–4000 で b=5.0 一定 →
# 4000–8000 で線形 anneal 5.0→0 → 8000 以降 0 (正典報酬のみ、判定窓)。
call_bonus_b = 5.0
call_bonus_full_until_step = 4000
call_bonus_zero_at_step = 8000

[train_play.default]
games = 800
log_dir = '/home/gamba/mahjong/runs/ppo/stage3_20260712_033403/train_play/default'
repeats = 1

[train_play.client0]
games = 20
log_dir = '/home/gamba/mahjong/runs/ppo/stage3_20260712_033403/train_play/client0'
repeats = 1

[train_play.client1]
games = 20
log_dir = '/home/gamba/mahjong/runs/ppo/stage3_20260712_033403/train_play/client1'
repeats = 1

[train_play.client2]
games = 20
log_dir = '/home/gamba/mahjong/runs/ppo/stage3_20260712_033403/train_play/client2'
repeats = 1

[test_play]
