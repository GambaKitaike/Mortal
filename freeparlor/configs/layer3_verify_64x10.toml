[optim.scheduler]
peak = 1e-4
final = 1e-4
warm_up_steps = 0
max_steps = 100000

[baseline.train]
device = 'cuda:0'
enable_compile = false
state_file = '/home/gamba/mahjong/runs/grp_baseline.pth'

[baseline.test]
device = 'cuda:0'
enable_compile = false
state_file = '/home/gamba/mahjong/runs/grp_baseline.pth'

[online]
