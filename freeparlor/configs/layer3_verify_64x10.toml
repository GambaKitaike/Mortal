# Layer 3 verification — 64×10 smoke

[control]
version = 4
online = false

state_file = '/tmp/layer3_verify/mortal.pth'
best_state_file = '/tmp/layer3_verify/best.pth'
tensorboard_dir = '/tmp/layer3_verify/tb'

device = 'cuda:0'
enable_cudnn_benchmark = false
enable_amp = true
enable_compile = false

batch_size = 64
opt_step_every = 1

save_every = 200
test_every = 100000
submit_every = 400

[train_play.default]
games = 800
log_dir = '/tmp/layer3_verify/train_play'
boltzmann_epsilon = 0.005
boltzmann_temp = 0.05
top_p = 1.0
repeats = 1

[test_play]
games = 3000
log_dir = '/tmp/layer3_verify/test_play'

[dataset]
globs = ['/home/gamba/mahjong/data/tenhou/2009/2009020103gm-00a9-0000-2453a04c.mjson']
file_index = '/tmp/layer3_verify/file_index.pth'
file_batch_size = 5
reserve_ratio = 0.0
num_workers = 0
player_names_files = []
num_epochs = 1
enable_augmentation = false
augmented_first = false
games_per_batch = 4

[env]
gamma = 1
pts = [35, 5, -15, -25]
alpha = 1.0
gamma_pt = 1.0
beta = 0.3
chip_value = 5.0
chip_dir = '/home/gamba/mahjong/data/tenhou/chips'
lambda_opp = 0.0
noten_factor = 0.0
beta_sel_max = 0.3
beta_sel_warmup_steps = 2000
beta_sel_ramp_steps = 2000
chip_n_step = 3
chip_target_tau = 0.005
chip_weight = 1.0

[resnet]
