# PPO P2b — lr probe (lr=2e-5 only; otherwise identical to ppo_p2_smoke.toml)

[control]
version = 4
online = true

state_file = '/home/gamba/mahjong/runs/ppo/smoke_p2b/mortal.pth'
best_state_file = '/home/gamba/mahjong/runs/ppo/smoke_p2b/best.pth'
tensorboard_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/tb'

device = 'cuda:0'
enable_cudnn_benchmark = false
enable_amp = true
enable_compile = false

batch_size = 128
opt_step_every = 1
save_every = 50
test_every = 100000
submit_every = 50

[ppo]
enabled = true
eps_clip = 0.2
c_vf = 0.5
c_ent = 0.01
gae_lambda = 0.95
gamma_disc = 1.0
tau_init = 1.0
huber_delta = 15.0
lr = 2e-5
ppo_epochs = 4
minibatch_size = 512
init_checkpoint = '/home/gamba/mahjong/runs/phase4/beta1_huber_192x40/mortal.pth'
max_steps = 400

[train_play.default]
games = 800
log_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/train_play/default'
repeats = 1

[train_play.client0]
games = 20
log_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/train_play/client0'
repeats = 1

[train_play.client1]
games = 20
log_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/train_play/client1'
repeats = 1

[train_play.client2]
games = 20
log_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/train_play/client2'
repeats = 1

[test_play]
games = 400
log_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/test_play'
self_play = true

[dataset]
globs = []
file_index = ''
file_batch_size = 15
reserve_ratio = 0.0
num_workers = 0
player_names_files = []
num_epochs = 1
enable_augmentation = false
augmented_first = false

[env]
gamma = 1
pts = [35, 5, -15, -25]
alpha = 1.0
gamma_pt = 1.0
beta = 1.0
chip_value = 5.0
lambda_opp = 0.0
noten_factor = 0.0

[resnet]
conv_channels = 192
num_blocks = 40

[cql]
min_q_weight = 5

[aux]
next_rank_weight = 0.2

[freeze_bn]
mortal = false

[optim]
eps = 1e-8
betas = [0.9, 0.999]
weight_decay = 0.1
max_grad_norm = 0

[optim.scheduler]
peak = 1e-4
final = 1e-4
warm_up_steps = 0
max_steps = 100000

[baseline.train]
device = 'cuda:0'
enable_compile = false
state_file = '/home/gamba/mahjong/runs/grp_baseline.pth'

[baseline.test]
device = 'cuda:0'
enable_compile = false
state_file = '/home/gamba/mahjong/runs/grp_baseline.pth'

[online]
history_window = 50
enable_compile = false

[online.remote]
host = '127.0.0.1'
port = 5000

[online.server]
buffer_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/buffer'
drain_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/drain'
sample_reuse_rate = 0
sample_reuse_threshold = 0
capacity = 1600
force_sequential = false

[grp]
state_file = '/home/gamba/mahjong/runs/grp.pth'

[grp.network]
hidden_size = 64
num_layers = 2

[grp.control]
device = 'cuda:0'
enable_cudnn_benchmark = false
tensorboard_dir = '/home/gamba/mahjong/runs/ppo/smoke_p2b/grp_log'
batch_size = 256
save_every = 2000
