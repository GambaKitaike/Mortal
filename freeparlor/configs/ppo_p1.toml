# PPO P1 plumbing — offline sanity / init from β=1 Huber 192×40 checkpoint
# Replace <HOME> with /home/gamba

[control]
version = 4
online = false

state_file = '<HOME>/mahjong/runs/ppo/p1/mortal.pth'
best_state_file = '<HOME>/mahjong/runs/ppo/p1/best.pth'
tensorboard_dir = '<HOME>/mahjong/runs/ppo/p1/tb'

device = 'cpu'
enable_cudnn_benchmark = false
enable_amp = false
enable_compile = false

batch_size = 128
opt_step_every = 1
save_every = 400
test_every = 20000
submit_every = 400

[ppo]
enabled = true
eps_clip = 0.2
c_vf = 0.5
c_ent = 0.01
gae_lambda = 0.95
gamma_disc = 1.0
tau_init = 1.0
huber_delta = 15.0
lr = 3e-4
init_checkpoint = '<HOME>/mahjong/runs/phase4/beta1_huber_192x40/mortal.pth'
trajectory_glob = ''

[train_play.default]
games = 800
log_dir = '<HOME>/mahjong/runs/ppo/p1/train_play'
boltzmann_epsilon = 0.005
boltzmann_temp = 0.05
top_p = 1.0
repeats = 1

[test_play]
games = 3000
log_dir = '<HOME>/mahjong/runs/ppo/p1/test_play'

[dataset]
globs = []
file_index = ''
file_batch_size = 15
reserve_ratio = 0.0
num_workers = 0
player_names_files = []
num_epochs = 1
enable_augmentation = false
augmented_first = false

[env]
gamma = 1
pts = [35, 5, -15, -25]
alpha = 1.0
gamma_pt = 1.0
beta = 1.0
chip_value = 5.0
chip_dir = '<HOME>/mahjong/data/tenhou/chips'
lambda_opp = 0.0
noten_factor = 0.0

[resnet]
conv_channels = 192
num_blocks = 40

[cql]
min_q_weight = 5

[aux]
next_rank_weight = 0.2

[freeze_bn]
mortal = false

[optim]
eps = 1e-8
betas = [0.9, 0.999]
weight_decay = 0.1
max_grad_norm = 0

[optim.scheduler]
peak = 1e-4
final = 1e-4
warm_up_steps = 0
max_steps = 100000

[baseline.train]
device = 'cpu'
enable_compile = false
state_file = '<HOME>/mahjong/runs/grp_baseline.pth'

[baseline.test]
device = 'cpu'
enable_compile = false
state_file = '<HOME>/mahjong/runs/grp_baseline.pth'

[online]
history_window = 50
enable_compile = false

[online.remote]
host = '127.0.0.1'
port = 5000

[online.server]
buffer_dir = '<HOME>/mahjong/runs/ppo/buffer'
drain_dir = '<HOME>/mahjong/runs/ppo/drain'
sample_reuse_rate = 0
sample_reuse_threshold = 0
capacity = 1600
force_sequential = false

[grp]
state_file = '<HOME>/mahjong/runs/grp.pth'

[grp.network]
hidden_size = 64
num_layers = 2

[grp.control]
device = 'cpu'
enable_cudnn_benchmark = false
tensorboard_dir = '<HOME>/mahjong/runs/grp_log'
batch_size = 256
save_every = 2000
val_steps = 400

[grp.dataset]
train_globs = []
val_globs = []
file_index = ''
file_batch_size = 50

[grp.optim]
lr = 1e-5
